<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="g" cx="42%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#ff2222"/>
      <stop offset="100%" stop-color="#7a0000"/>
    </radialGradient>
  </defs>
  <!-- Limbal ring -->
  <circle cx="100" cy="100" r="99" fill="#0a0000"/>
  <!-- Iris -->
  <circle cx="100" cy="100" r="92" fill="url(#g)"/>
  <!-- 6-pointed star pattern (Sasuke's EMS) -->
  <!-- Outer 6 elongated petals -->
  <g transform="rotate(0 100 100)">
    <ellipse cx="100" cy="58" rx="10" ry="28" fill="#1a0000"/>
  </g>
  <g transform="rotate(60 100 100)">
    <ellipse cx="100" cy="58" rx="10" ry="28" fill="#1a0000"/>
  </g>
  <g transform="rotate(120 100 100)">
    <ellipse cx="100" cy="58" rx="10" ry="28" fill="#1a0000"/>
  </g>
  <g transform="rotate(180 100 100)">
    <ellipse cx="100" cy="58" rx="10" ry="28" fill="#1a0000"/>
  </g>
  <g transform="rotate(240 100 100)">
    <ellipse cx="100" cy="58" rx="10" ry="28" fill="#1a0000"/>
  </g>
  <g transform="rotate(300 100 100)">
    <ellipse cx="100" cy="58" rx="10" ry="28" fill="#1a0000"/>
  </g>
  <!-- Mid ring -->
  <circle cx="100" cy="100" r="52" fill="none" stroke="#1a0000" stroke-width="8"/>
  <!-- Inner flower: 3 smaller petals offset 60° from outer -->
  <g transform="rotate(30 100 100)">
    <ellipse cx="100" cy="72" rx="7" ry="18" fill="#000"/>
  </g>
  <g transform="rotate(150 100 100)">
    <ellipse cx="100" cy="72" rx="7" ry="18" fill="#000"/>
  </g>
  <g transform="rotate(270 100 100)">
    <ellipse cx="100" cy="72" rx="7" ry="18" fill="#000"/>
  </g>
  <!-- Pupil -->
  <circle cx="100" cy="100" r="24" fill="#000"/>
  <!-- Highlight ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#ff7777" stroke-width="1.5" opacity="0.5"/>
</svg>
