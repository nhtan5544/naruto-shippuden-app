<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="g" cx="40%" cy="36%" r="60%">
      <stop offset="0%" stop-color="#ff1155"/>
      <stop offset="60%" stop-color="#cc0022"/>
      <stop offset="100%" stop-color="#6a0010"/>
    </radialGradient>
  </defs>
  <!-- Limbal ring -->
  <circle cx="100" cy="100" r="99" fill="#050005"/>
  <!-- Iris -->
  <circle cx="100" cy="100" r="92" fill="url(#g)"/>
  <!-- Concentric rings (many, close together like Rinnegan+Sharingan) -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#8b0020" stroke-width="3"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="#8b0020" stroke-width="3"/>
  <circle cx="100" cy="100" r="62" fill="none" stroke="#8b0020" stroke-width="3"/>
  <circle cx="100" cy="100" r="52" fill="none" stroke="#8b0020" stroke-width="3"/>
  <circle cx="100" cy="100" r="42" fill="none" stroke="#8b0020" stroke-width="3"/>
  <!-- 9 tomoe in 3 groups of 3 -->
  <!-- Outer ring: 3 tomoe -->
  <circle cx="100" cy="22" r="6" fill="#000" transform="rotate(0 100 100)"/>
  <circle cx="100" cy="22" r="6" fill="#000" transform="rotate(120 100 100)"/>
  <circle cx="100" cy="22" r="6" fill="#000" transform="rotate(240 100 100)"/>
  <!-- Middle ring: 3 tomoe (offset 60°) -->
  <circle cx="100" cy="42" r="5" fill="#000" transform="rotate(60 100 100)"/>
  <circle cx="100" cy="42" r="5" fill="#000" transform="rotate(180 100 100)"/>
  <circle cx="100" cy="42" r="5" fill="#000" transform="rotate(300 100 100)"/>
  <!-- Inner ring: 3 tomoe -->
  <circle cx="100" cy="62" r="4.5" fill="#000" transform="rotate(0 100 100)"/>
  <circle cx="100" cy="62" r="4.5" fill="#000" transform="rotate(120 100 100)"/>
  <circle cx="100" cy="62" r="4.5" fill="#000" transform="rotate(240 100 100)"/>
  <!-- Pupil -->
  <circle cx="100" cy="100" r="20" fill="#000"/>
  <!-- Highlight -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#ff4488" stroke-width="1.5" opacity="0.6"/>
</svg>
