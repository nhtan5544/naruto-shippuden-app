<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="g" cx="42%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="50%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Limbal ring -->
  <circle cx="100" cy="100" r="99" fill="#020c14"/>
  <!-- Glow -->
  <circle cx="100" cy="100" r="92" fill="url(#glow)"/>
  <!-- Iris -->
  <circle cx="100" cy="100" r="92" fill="url(#g)"/>
  <!-- Lotus/snowflake petals (6 outer petals) -->
  <g transform="rotate(0 100 100)">
    <ellipse cx="100" cy="54" rx="12" ry="30" fill="#0c4a6e" opacity="0.8"/>
  </g>
  <g transform="rotate(60 100 100)">
    <ellipse cx="100" cy="54" rx="12" ry="30" fill="#0c4a6e" opacity="0.8"/>
  </g>
  <g transform="rotate(120 100 100)">
    <ellipse cx="100" cy="54" rx="12" ry="30" fill="#0c4a6e" opacity="0.8"/>
  </g>
  <g transform="rotate(180 100 100)">
    <ellipse cx="100" cy="54" rx="12" ry="30" fill="#0c4a6e" opacity="0.8"/>
  </g>
  <g transform="rotate(240 100 100)">
    <ellipse cx="100" cy="54" rx="12" ry="30" fill="#0c4a6e" opacity="0.8"/>
  </g>
  <g transform="rotate(300 100 100)">
    <ellipse cx="100" cy="54" rx="12" ry="30" fill="#0c4a6e" opacity="0.8"/>
  </g>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="42" fill="#075985"/>
  <!-- Inner 6 petals (rotated 30°) -->
  <g transform="rotate(30 100 100)">
    <ellipse cx="100" cy="70" rx="7" ry="18" fill="#0c4a6e"/>
  </g>
  <g transform="rotate(90 100 100)">
    <ellipse cx="100" cy="70" rx="7" ry="18" fill="#0c4a6e"/>
  </g>
  <g transform="rotate(150 100 100)">
    <ellipse cx="100" cy="70" rx="7" ry="18" fill="#0c4a6e"/>
  </g>
  <g transform="rotate(210 100 100)">
    <ellipse cx="100" cy="70" rx="7" ry="18" fill="#0c4a6e"/>
  </g>
  <g transform="rotate(270 100 100)">
    <ellipse cx="100" cy="70" rx="7" ry="18" fill="#0c4a6e"/>
  </g>
  <g transform="rotate(330 100 100)">
    <ellipse cx="100" cy="70" rx="7" ry="18" fill="#0c4a6e"/>
  </g>
  <!-- Pupil -->
  <circle cx="100" cy="100" r="24" fill="#001824"/>
  <!-- Glow highlight -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#7dd3fc" stroke-width="2" opacity="0.6"/>
</svg>
